version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: study-db
    environment:
      POSTGRES_DB: studyapp
      POSTGRES_USER: studyapp
      POSTGRES_PASSWORD: studyapp_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyapp"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    container_name: study-api
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://studyapp:studyapp_dev@postgres:5432/studyapp
      PORT: 4000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: ./packages/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: study-web
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres_data:
